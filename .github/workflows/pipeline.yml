name: EnergyOps Pipeline

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install --no-cache-dir confluent-kafka requests python-dotenv pandas numpy

      - name: Write Aiven SSL certificates
        run: |
          mkdir -p certs
          echo "${{ secrets.KAFKA_CA_CERT }}" > certs/ca.pem
          echo "${{ secrets.KAFKA_ACCESS_CERT }}" > certs/service.cert
          echo "${{ secrets.KAFKA_ACCESS_KEY }}" > certs/service.key

      - name: Run Kafka producer
        env:
          KAFKA_BOOTSTRAP_SERVER: ${{ secrets.KAFKA_BOOTSTRAP_SERVER }}
          KAFKA_TOPIC: energy-readings
          KAFKA_SSL_CA: certs/ca.pem
          KAFKA_SSL_CERT: certs/service.cert
          KAFKA_SSL_KEY: certs/service.key
        run: python kafka_producer_once.py || echo "Producer failed — continuing"
        continue-on-error: true

      - name: Run Kafka consumer
        env:
          KAFKA_BOOTSTRAP_SERVER: ${{ secrets.KAFKA_BOOTSTRAP_SERVER }}
          KAFKA_TOPIC: energy-readings
          KAFKA_SSL_CA: certs/ca.pem
          KAFKA_SSL_CERT: certs/service.cert
          KAFKA_SSL_KEY: certs/service.key
        run: python kafka_consumer_once.py || echo "Consumer failed — continuing"
        continue-on-error: true

      - name: Commit updated database
        run: |
          git config --global user.name 'EnergyOps Bot'
          git config --global user.email 'bot@energyops.local'
          git add energy.db
          git diff --staged --quiet || git commit -m "chore: update energy.db — $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
